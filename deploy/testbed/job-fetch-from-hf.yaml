apiVersion: batch/v1
kind: Job
metadata:
  name: download-models
  namespace: kserve-bench
spec:
  backoffLimit: 2
  activeDeadlineSeconds: 7200
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: download-models
          image: python:3.11-slim
          volumeMounts:
            - name: models-cache
              mountPath: /work
            - name: models-manifest
              mountPath: /etc/config
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              apt-get update && apt-get install -y --no-install-recommends jq curl ca-certificates
              curl -sSLo /usr/local/bin/mc https://dl.min.io/client/mc/release/linux-amd64/mc
              chmod +x /usr/local/bin/mc
              python -m pip install --no-cache-dir huggingface_hub hf_transfer
              mc alias set bench http://$MINIO_ENDPOINT $MINIO_ACCESS_KEY $MINIO_SECRET_KEY
              mc mb bench/models --ignore-existing

              jq -c '.[]' /etc/config/manifest.json | while read -r model; do 
                name=$(jq -r '.model_name' <<< "$model")
                fmt=$(jq -r '.model_format' <<< "$model")
                kind=$(jq -r '.kind' <<< "$model")
                repo=$(jq -r '.hf_repo' <<< "$model")
                file=$(jq -r '.hf_file' <<< "$model")
                dest="bench/models/$name/$fmt"

                if [ "$kind" = "dir" ]; then
                  if [ -n "$(mc ls "$dest/" 2>/dev/null || true)" ]; then
                      echo "[$name/$fmt] already present, skipping"
                      continue
                  fi

                  work="/work/$name-$fmt"; rm -rf "$work"; mkdir -p "$work"
                  hf download "$repo" --local-dir "$work" --exclude "original/*" "*.pth" "*.pt"
                  mc cp -r "$work/" "$dest/"
                  rm -rf "$work"
                  echo "[$name/$fmt] uploaded snapshot of $repo"
                else
                  file=$(jq -r '.hf_file' <<< "$model")
                  if mc stat "$dest" >/dev/null 2>&1; then
                      echo "[$name/$fmt] already present, skipping"
                      continue
                  fi

                  hf download "$repo" "$file" --local-dir /work
                  mc cp /work/$file "$dest"
                  local_size=$(stat -c%s /work/$file)
                  remote_size=$(mc stat --json "$dest" | jq -r '.size')
                  if [ "$local_size" != "$remote_size" ]; then
                      echo "ERROR: size mismatch local=$local_size remote=$remote_size"
                      exit 1
                  fi
                  rm -rf "/work/$file"
                  echo "[$name/$fmt] uploaded $file from $repo"
                fi
              done
              echo "COMPLETE"
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: huggingface-credentials
                  key: HF_TOKEN
            - name: MINIO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: ENDPOINT
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: SECRET_ACCESS_KEY
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: minio-credentials
                  key: ACCESS_KEY_ID
      volumes:
        - name: models-cache
          emptyDir:
            sizeLimit: "120Gi"
        - name: models-manifest
          configMap:
            name: models-manifest
            items:
              - key: manifest.json
                path: manifest.json
