apiVersion: batch/v1
kind: Job
metadata:
  name: anansi-run
  namespace: kserve-bench
spec:
  backoffLimit: 0
  completions: 1
  parallelism: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: anansi
        app.kubernetes.io/part-of: anansi
    spec:
      serviceAccountName: anansi-bench
      restartPolicy: Never
      containers:
        - name: anansi
          image: ghcr.io/zewolfe/anansi:latest
          imagePullPolicy: IfNotPresent
          args:
            - "run"
            - "--config=/configs/matrix-full.yaml"
            - "--output=/results"
            - "--mode=in-cluster"
          resources:
            requests:
              cpu: "1"
              memory: 512Mi
            limits:
              memory: 1Gi
          volumeMounts:
            - name: results
              mountPath: /results
      volumes:
        - name: results
          persistentVolumeClaim:
            claimName: anansi-results
